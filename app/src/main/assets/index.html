<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محمود | باحث تيك توك</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, system-ui, sans-serif;
    }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 750px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 35px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 0 2px #ffd700, 0 0 0 5px #ff69b4;
    }
    h1 {
      font-size: 42px;
      font-weight: 800;
      text-align: center;
      color: #ff1493;
      text-shadow: 3px 3px 0 #ffd700, 5px 5px 0 #00ffff;
      margin-bottom: 5px;
      letter-spacing: -1px;
    }
    .syrian {
      text-align: center;
      font-size: 22px;
      color: #8a2be2;
      font-weight: 600;
      margin-bottom: 25px;
      background: #ffd700;
      display: inline-block;
      padding: 8px 30px;
      border-radius: 60px;
      margin-right: auto;
      margin-left: auto;
      width: fit-content;
      border: 3px solid #ff1493;
      transform: rotate(-1deg);
    }
    .search-box {
      background: #fff;
      border-radius: 80px;
      padding: 8px;
      display: flex;
      border: 4px solid #ff69b4;
      box-shadow: 0 10px 0 #8a2be2, 0 15px 25px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }
    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 18px 25px;
      font-size: 20px;
      direction: ltr;
      color: #333;
      font-weight: 500;
    }
    .search-box input:focus {
      outline: none;
    }
    .search-box input::placeholder {
      color: #b0b0b0;
      font-size: 18px;
    }
    .search-box button {
      background: #ff4500;
      border: none;
      color: white;
      padding: 0 40px;
      border-radius: 80px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      border: 3px solid #ffd700;
      box-shadow: 0 5px 0 #b22222;
    }
    .search-box button:hover {
      background: #ff6347;
      transform: translateY(-2px);
      box-shadow: 0 7px 0 #b22222;
    }
    .card {
      background: #fff0f5;
      border-radius: 40px;
      padding: 30px;
      border: 4px solid #00ced1;
      box-shadow: 0 15px 0 #ff69b4, 0 20px 30px rgba(0,0,0,0.2);
    }
    .profile {
      display: flex;
      gap: 25px;
      margin-bottom: 30px;
      align-items: center;
      flex-wrap: wrap;
      background: #ffe4e1;
      padding: 20px;
      border-radius: 50px;
      border: 3px dashed #ff1493;
    }
    .profile img {
      width: 110px;
      height: 110px;
      border-radius: 40px;
      border: 5px solid #ffd700;
      object-fit: cover;
      background: #fff;
    }
    .name h2 {
      font-size: 32px;
      color: #8b008b;
      font-weight: 800;
    }
    .name a {
      color: #00bfff;
      text-decoration: none;
      font-size: 22px;
      font-weight: 600;
      background: #fff;
      padding: 5px 15px;
      border-radius: 60px;
      border: 2px solid #ff69b4;
      display: inline-block;
      margin: 8px 0;
    }
    .region {
      background: #7cfc00;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 20px;
      font-weight: 700;
      display: inline-block;
      border: 3px solid #ff1493;
      color: #000;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat {
      background: linear-gradient(145deg, #ffd700, #ffa500);
      border-radius: 30px;
      padding: 20px 10px;
      text-align: center;
      border: 3px solid #ff1493;
      box-shadow: 0 8px 0 #b22222;
    }
    .stat .num {
      font-size: 32px;
      font-weight: 800;
      color: #8b0000;
    }
    .stat .label {
      font-size: 18px;
      font-weight: 700;
      color: #2e2e2e;
      margin-top: 8px;
    }
    .stat .label i {
      color: #fff;
      margin-left: 5px;
    }
    .details {
      background: #e6e6fa;
      border-radius: 35px;
      padding: 25px;
      border: 3px solid #00fa9a;
      box-shadow: inset 0 0 15px #ff69b4;
    }
    .detail-item {
      display: flex;
      padding: 15px 0;
      border-bottom: 2px solid #c71585;
      font-size: 20px;
      align-items: center;
    }
    .detail-item:last-child {
      border-bottom: none;
    }
    .detail-item i {
      width: 40px;
      color: #ff1493;
      font-size: 24px;
    }
    .detail-item span {
      color: #4b0082;
      font-weight: 600;
      margin-left: 10px;
    }
    .detail-item strong {
      direction: ltr;
      background: #fff;
      padding: 5px 15px;
      border-radius: 60px;
      border: 2px solid #ff69b4;
      font-size: 18px;
    }
    .loader {
      display: none;
      text-align: center;
      padding: 50px;
    }
    .loader i {
      font-size: 60px;
      color: #ff1493;
      animation: spin 1s linear infinite;
      text-shadow: 0 0 20px #ffd700;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      background: #ffb6c1;
      border: 4px solid #ff1493;
      color: #8b0000;
      padding: 25px;
      border-radius: 40px;
      text-align: center;
      margin-top: 20px;
      display: none;
      font-size: 24px;
      font-weight: 700;
    }
    .footer {
      margin-top: 30px;
      text-align: center;
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(90deg, #ff1493, #ffd700, #00ffff, #ff69b4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 2px 2px 0 #000;
      border-top: 4px solid #ffd700;
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 باحث تيك توك</h1>
    <div class="syrian">
      <i class="fa-regular fa-face-smile-wink"></i> يللا نكشف الحسابات سوا
    </div>

    <div class="search-box">
      <input type="text" id="username" placeholder="@username ... اسم المستخدم" value="tiktok">
      <button onclick="fetchTikTokData()"><i class="fa-solid fa-magnifying-glass"></i> دغري</button>
    </div>

    <div class="loader" id="loader">
      <i class="fa-solid fa-circle-notch"></i>
      <p style="font-size: 24px; color: #ff1493; font-weight: 700;">عم دور عالحساب ...</p>
    </div>

    <div class="error" id="error"></div>

    <div class="card" id="results" style="display: none;"></div>

    <div class="footer">
      2026 - محمود
    </div>
  </div>

  <script>
    async function fetchTikTokData() {
      const username = document.getElementById('username').value.trim().replace('@', '');
      if (!username) return;

      const loader = document.getElementById('loader');
      const errorDiv = document.getElementById('error');
      const resultsDiv = document.getElementById('results');

      loader.style.display = 'block';
      errorDiv.style.display = 'none';
      resultsDiv.style.display = 'none';

      try {
        const response = await fetch(`https://www.tikwm.com/api/user/info?unique_id=@${username}`);
        const data = await response.json();

        loader.style.display = 'none';

        if (data.code !== 0) {
          errorDiv.style.display = 'block';
          errorDiv.textContent = '😢 هالحساب ما موجود يمعلم';
          return;
        }

        const user = data.data.user;
        const stats = data.data.stats;

        let country = 'بدون منطقة';
        if (user.region) {
          const regionMap = {
            'SA': '🇸🇦 السعودية', 'EG': '🇪🇬 مصر', 'AE': '🇦🇪 الإمارات',
            'KW': '🇰🇼 الكويت', 'QA': '🇶🇦 قطر', 'BH': '🇧🇭 البحرين',
            'OM': '🇴🇲 عمان', 'IQ': '🇮🇶 العراق', 'JO': '🇯🇴 الأردن',
            'LB': '🇱🇧 لبنان', 'PS': '🇵🇸 فلسطين', 'YE': '🇾🇪 اليمن',
            'SD': '🇸🇩 السودان', 'LY': '🇱🇾 ليبيا', 'TN': '🇹🇳 تونس',
            'DZ': '🇩🇿 الجزائر', 'MA': '🇲🇦 المغرب', 'SY': '🇸🇾 سوريا',
            'US': '🇺🇸 أمريكا', 'GB': '🇬🇧 بريطانيا', 'TR': '🇹🇷 تركيا'
          };
          country = regionMap[user.region] || `دولة ${user.region}`;
        }

        function formatNumber(num) {
          if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
          if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
          return num;
        }

        const html = `
          <div class="profile">
            <img src="${user.avatar_medium}" alt="avatar">
            <div class="name">
              <h2>${user.nickname || 'ما في اسم'}</h2>
              <a href="https://tiktok.com/@${user.unique_id}" target="_blank">@${user.unique_id}</a>
              <div class="region"><i class="fa-solid fa-globe"></i> ${country}</div>
            </div>
          </div>

          <div class="stats">
            <div class="stat"><span class="num">${formatNumber(stats.followerCount)}</span><div class="label"><i class="fa-solid fa-users"></i> متابعين</div></div>
            <div class="stat"><span class="num">${formatNumber(stats.followingCount)}</span><div class="label"><i class="fa-solid fa-user-plus"></i> تابعين</div></div>
            <div class="stat"><span class="num">${formatNumber(stats.heartCount)}</span><div class="label"><i class="fa-solid fa-heart"></i> قلوب</div></div>
            <div class="stat"><span class="num">${formatNumber(stats.videoCount)}</span><div class="label"><i class="fa-solid fa-video"></i> فيديوهات</div></div>
          </div>

          <div class="details">
            <div class="detail-item"><i class="fa-solid fa-fingerprint"></i> <span>المعرف:</span> <strong>${user.id}</strong></div>
            <div class="detail-item"><i class="fa-solid fa-lock"></i> <span>خاص؟</span> <strong>${user.privateAccount ? 'اي خاص 🔒' : 'لا عام ✅'}</strong></div>
            <div class="detail-item"><i class="fa-solid fa-circle-check"></i> <span>موثق؟</span> <strong>${user.verified ? 'اي موثق ⭐' : 'لا'}</strong></div>
            <div class="detail-item"><i class="fa-solid fa-calendar"></i> <span>منشي:</span> <strong>${new Date(user.createTime * 1000).toLocaleDateString('ar-EG')}</strong></div>
          </div>

          <div style="margin-top: 25px; font-size: 18px; color: #ff1493; text-align: center; font-weight: 700;">
            <i class="fa-regular fa-clock"></i> آخر تحديث: هلأ الساعة ${new Date().toLocaleTimeString('ar-EG')}
          </div>
        `;

        resultsDiv.innerHTML = html;
        resultsDiv.style.display = 'block';

      } catch (err) {
        loader.style.display = 'none';
        errorDiv.style.display = 'block';
        errorDiv.textContent = '😱 في مشكلة بالاتصال .. جرب تاني';
      }
    }

    window.onload = () => fetchTikTokData();
  </script>
</body>
</html>
